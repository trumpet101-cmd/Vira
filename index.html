<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Víra Tahlwyn - D&D Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #d6d3d1; border-radius: 20px; border: 3px solid transparent; background-clip: content-box; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #a8a29e; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        
        /* Smooth collapsing transitions */
        .collapsible-content {
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out, margin 0.3s ease-out;
            max-height: 2000px;
            opacity: 1;
            overflow: hidden;
        }
        .collapsible-content.collapsed {
            max-height: 0;
            opacity: 0;
            margin-top: 0 !important;
            margin-bottom: 0 !important;
        }
        .chevron { transition: transform 0.3s ease; }
        .chevron.collapsed { transform: rotate(-90deg); }
        
        /* Seamless Input Styling */
        .seamless-input { transition: all 0.2s ease; }
        .seamless-input:hover { background-color: rgba(28, 25, 23, 0.05); } 
        .seamless-input:focus { background-color: #ffffff; outline: none; box-shadow: 0 0 0 2px #10b981; }

        /* Content Editable Placeholder Hack */
        [contenteditable="true"]:empty:before {
            content: attr(data-placeholder);
            color: #a8a29e;
            pointer-events: none;
            display: block;
        }
        
        /* Stop focus outline on internal links */
        [contenteditable="true"] a { user-select: none; }

        /* Outline List Styling for Session Notes & Campaign Sections */
        .seamless-input ul {
            list-style-type: disc !important;
            margin-left: 1.5rem !important;
            margin-top: 0.25rem !important;
            margin-bottom: 0.25rem !important;
        }
        .seamless-input ul ul {
            list-style-type: circle !important;
            margin-left: 1.5rem !important;
        }
        .seamless-input ul ul ul {
            list-style-type: square !important;
            margin-left: 1.5rem !important;
        }
        .seamless-input li {
            margin-bottom: 0.25rem !important;
            padding-left: 0.25rem !important;
        }
    </style>
</head>
<body class="bg-stone-100 text-stone-800 font-sans h-screen flex overflow-hidden">

    <!-- Auth Lock Screen Overlay -->
    <div id="auth-overlay" class="fixed inset-0 bg-stone-950/90 backdrop-blur-md z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl border border-stone-200 w-full max-w-md p-8 animate-fade-in">
            <div class="text-center mb-8">
                <span class="text-4xl">🌿</span>
                <h2 class="text-2xl font-black text-stone-800 mt-2 tracking-tight" id="auth-title">D&D Vault Authentication</h2>
                <p class="text-sm text-stone-500 mt-1" id="auth-subtitle">Log in to sync your character sheets and notes</p>
            </div>
            
            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-1">Email Address</label>
                    <input type="email" id="auth-email" required class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition-all" placeholder="dm_or_player@example.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-1">Password</label>
                    <input type="password" id="auth-password" required class="w-full px-4 py-3 rounded-xl border border-stone-200 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition-all" placeholder="••••••••">
                </div>
                <div id="auth-error" class="text-red-600 text-sm hidden bg-red-50 p-3 rounded-lg border border-red-100 leading-relaxed font-medium"></div>
                
                <button type="submit" id="auth-btn-primary" class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl transition-all shadow-lg shadow-emerald-600/20 flex items-center justify-center space-x-2">
                    <span id="auth-btn-text">Sign In</span>
                </button>
                
                <div class="text-center pt-2">
                    <button type="button" id="auth-btn-toggle" class="text-sm text-emerald-600 hover:text-emerald-700 font-semibold focus:outline-none">
                        Need an account? Register Here
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Reusable Custom Dialog/Alert Modal -->
    <div id="custom-dialog" class="fixed inset-0 bg-stone-950/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl shadow-2xl border border-stone-200 w-full max-w-sm p-6 text-center animate-fade-in">
            <div class="text-4xl mb-3" id="dialog-icon">⚠️</div>
            <h3 class="text-xl font-bold text-stone-800 tracking-tight" id="dialog-title">Are you sure?</h3>
            <p class="text-sm text-stone-500 mt-2 leading-relaxed" id="dialog-message">This action cannot be undone.</p>
            <div class="flex space-x-3 mt-6">
                <button id="dialog-cancel-btn" class="flex-1 py-2.5 border border-stone-200 hover:bg-stone-50 text-stone-600 font-semibold rounded-xl transition-all">Cancel</button>
                <button id="dialog-confirm-btn" class="flex-1 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl transition-all">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden md:hidden" onclick="toggleMobileMenu()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition duration-200 ease-in-out w-64 bg-stone-900 text-stone-200 flex flex-col z-30 shadow-xl">
        <div class="p-6 flex items-center justify-between border-b border-stone-800">
            <div>
                <h1 class="text-xl font-bold text-emerald-500 tracking-wider">D&D VAULT</h1>
                <p class="text-xs text-stone-400 mt-1">Hybrid Cloud Edition</p>
            </div>
            <button class="md:hidden text-stone-400" onclick="toggleMobileMenu()">
                <i data-lucide="x"></i>
            </button>
        </div>

        <nav class="flex-1 p-4 space-y-2 overflow-y-auto" id="nav-container"></nav>

        <div class="p-4 border-t border-stone-800 space-y-3">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="exportJSON()" class="flex flex-col items-center justify-center space-y-1 py-2.5 bg-stone-800 hover:bg-stone-700 rounded-lg text-stone-300 transition-colors" title="Export current sheet data as a physical backup">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    <span class="text-[10px] font-bold uppercase tracking-wider">Export</span>
                </button>
                <button onclick="document.getElementById('import-json-input').click()" class="flex flex-col items-center justify-center space-y-1 py-2.5 bg-stone-800 hover:bg-stone-700 rounded-lg text-stone-300 transition-colors" title="Import an exported JSON backup sheet">
                    <i data-lucide="upload" class="w-4 h-4"></i>
                    <span class="text-[10px] font-bold uppercase tracking-wider">Import</span>
                </button>
                <input type="file" id="import-json-input" accept=".json" class="hidden" onchange="window.importJSON(event)">
            </div>
            <button onclick="window.handleSignOut()" class="w-full flex items-center justify-center space-x-2 px-4 py-2 bg-red-950/40 hover:bg-red-900 rounded text-sm text-red-300 transition-colors">
                <i data-lucide="log-out" class="w-4 h-4"></i>
                <span>Sign Out</span>
            </button>
            <div id="cloud-status-btn" class="w-full flex items-center justify-center space-x-2 px-4 py-2 bg-stone-800 rounded text-sm text-stone-400">
                <i data-lucide="hard-drive" class="w-4 h-4"></i>
                <span>Local Storage Active</span>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-stone-50 relative">
        
        <header class="bg-white shadow-sm px-6 py-4 flex items-center justify-between z-10">
            <div class="flex items-center space-x-4">
                <button class="md:hidden text-stone-600 hover:text-emerald-600" onclick="toggleMobileMenu()">
                    <i data-lucide="menu"></i>
                </button>
                <h2 class="text-2xl font-bold text-stone-800 tracking-tight flex items-center space-x-2">
                    <span class="text-emerald-600">🌿</span>
                    <input type="text" id="header-name-input" oninput="updateField(null, 'name', this.value)" class="font-bold text-stone-800 bg-transparent border-none focus:outline-none focus:ring-0 w-full max-w-[250px] p-0 m-0">
                </h2>
            </div>
            
            <div class="flex items-center space-x-2 text-stone-400 bg-stone-50 px-3 py-1.5 rounded-full border border-stone-200 transition-all duration-300" id="save-indicator">
                <span id="save-icon-wrapper" class="flex items-center justify-center">
                    <i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-500"></i>
                </span>
                <span class="text-sm font-medium" id="save-text">Saved automatically</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar" id="scroll-area">
            <div class="max-w-4xl mx-auto" id="content-area"></div>
            <div class="h-24 md:h-12"></div>
        </div>

        <!-- Global Mention Dropdown -->
        <ul id="mention-dropdown" class="hidden absolute z-50 bg-white border border-stone-200 rounded-xl shadow-2xl max-h-64 overflow-y-auto w-72 text-sm flex flex-col"></ul>
    </main>

    <!-- Use Type Module for Firebase Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- UTILS ---
        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
        window.escapeHtml = escapeHtml;

        function renderHTML(val) {
            if (!val) return '';
            if (!/<[a-z][\s\S]*>/i.test(val)) return escapeHtml(val).replace(/\n/g, '<br>');
            return val;
        }

        // --- INITIAL DATA (MODULAR TEMPLATE) ---
        const initialCharacterData = {
            name: "Víra Tahlwyn",
            basics: { race: "Wood Elf", class: "Barbarian (World Tree)", age: 27, background: "Nomadic Tribesman (Custom)", tribe: "Eryndral Tribe (Orroyen)", familiar: "Tato (Squirrel)" },
            backstory: [
                {
                    id: 'b_1',
                    title: "Early Life",
                    notes: `Growing up, Vira had a very traditional nomadic life within the Orroyen tribe...\n\nFrom her mother she learned to be upbeat, friendly and open - always seeing meeting others as a chance to “plant new seeds of friendship”.\n\nHer father was the careful balance to that - he taught her discipline, patience, vigilance.`,
                    isCollapsed: false
                },
                {
                    id: 'b_2',
                    title: "The Threat",
                    notes: `As with all members of the Orroyen tribes, Vira was well aware of the Iron Authority; the Hobgoblin nation who would see the destruction and conquest of the Jungle and all those who dwell within it.`,
                    isCollapsed: false
                },
                {
                    id: 'b_3',
                    title: "The Vision",
                    notes: `Many years later, Vira now 27, was led by a playful squirrel (Tato) to a clearing void of the thick dense jungle...`,
                    isCollapsed: false
                },
                {
                    id: 'b_4',
                    title: "The Journey",
                    notes: `After waking, she sought guidance. Syngorn was unhelpful; the elves were xenophobic and dismissive of her visions...`,
                    isCollapsed: false
                }
            ],
            personality: [
                {
                    id: 'p_1',
                    title: "Normal Personality",
                    subtitle: "Default State",
                    notes: "Has a very similar personality to her mother. 'Every stranger met is a seed of friendship planted'. A typically positive and upbeat personality. Excited for new opportunities.",
                    isCollapsed: false
                },
                {
                    id: 'p_2',
                    title: "Raging Personality",
                    subtitle: "Combat State",
                    notes: "Eye Color turns from a vibrant green to a dark oak brown. Ties up her hair into a ponytail. Adopts a personality closer to her father; stern, stoic and intensely focused.",
                    isCollapsed: false
                },
                {
                    id: 'p_3',
                    title: "Likes",
                    subtitle: "Interests & Preference",
                    notes: "Trees, Jungle life, Flora. Her Halberd. Her nomadic lifestyle. Respects animals as a means of hunting for survival.",
                    isCollapsed: false
                },
                {
                    id: 'p_4',
                    title: "Dislikes",
                    subtitle: "Fears & Aversions",
                    notes: "Hobgoblins & Goblins of The Iron Authority. Closed spaces (sealed stone structures, caverns, deep caves).",
                    isCollapsed: false
                }
            ],
            build: {
                abilities: [
                    { name: "Strength", starting: 15, species: 2, lvl1: 0, lvl4: 1, lvl8: 1, lvl12: 1, lvl16: 0, lvl19: 0, lvl20: 4 },
                    { name: "Dexterity", starting: 13, species: 1, lvl1: 0, lvl4: 0, lvl8: 0, lvl12: 0, lvl16: 0, lvl19: 0, lvl20: 0 },
                    { name: "Constitution", starting: 14, species: 0, lvl1: 0, lvl4: 0, lvl8: 0, lvl12: 0, lvl16: 0, lvl19: 0, lvl20: 4 },
                    { name: "Intelligence", starting: 12, species: 0, lvl1: 0, lvl4: 0, lvl8: 0, lvl12: 0, lvl16: 0, lvl19: 0, lvl20: 0 },
                    { name: "Wisdom", starting: 12, species: 0, lvl1: 0, lvl4: 0, lvl8: 0, lvl12: 0, lvl16: 0, lvl19: 0, lvl20: 0 },
                    { name: "Charisma", starting: 6, species: 0, lvl1: 0, lvl4: 0, lvl8: 0, lvl12: 0, lvl16: 0, lvl19: 0, lvl20: 0 }
                ],
                feats: {
                    lvl1: "Magic Initiate",
                    lvl4: "Charger",
                    lvl8: "Mage Slayer",
                    lvl12: "Great Weapon Master",
                    lvl16: "",
                    lvl19: "Epic Boon",
                    lvl20: "Combat Prowess"
                },
                features: [ "Barbarian (World Tree)", "Speed: 35 feet", "Darkvision: 60 feet", "Fey Ancestry: Advantage on Charm saves", "Trance: 4 hour long rest", "Origin Feat: Magic Initiate (Wizard) - Find Familiar, Message, Mending" ],
                equipment: []
            },
            campaignNotes: {
                sessionNotes: [],
                quests: [],
                npcs: [],
                locations: [],
                misc: ""
            }
        };

        // --- APP STATE ---
        let activeTab = 'campaignNotes';
        let isMobileMenuOpen = false;
        let questSectionsState = { inProgressCollapsed: false, completedCollapsed: false };
        let currentSearchQueries = { sessionNotes: '', quests: '', locations: '', npcs: '', backstory: '', personality: '' };
        
        let characterData = { ...initialCharacterData };

        // --- ROBUST LORE & DATA MIGRATION ENGINE ---
        function migrateData(data) {
            if (!data.campaignNotes) data.campaignNotes = initialCharacterData.campaignNotes;
            if (typeof data.campaignNotes.npcs === 'string') data.campaignNotes.npcs = initialCharacterData.campaignNotes.npcs;
            if (typeof data.campaignNotes.sessionNotes === 'string') {
                data.campaignNotes.sessionNotes = [ { id: 'sess_migrated', title: 'Imported Session Notes', date: '', notes: data.campaignNotes.sessionNotes, isCollapsed: false } ];
            }
            
            // Migrate backstory
            if (data.backstory && !Array.isArray(data.backstory)) {
                const oldBackstory = data.backstory;
                data.backstory = [
                    { id: 'b_1', title: "Early Life", notes: oldBackstory.earlyLife || "", isCollapsed: false },
                    { id: 'b_2', title: "The Threat", notes: oldBackstory.theThreat || "", isCollapsed: false },
                    { id: 'b_3', title: "The Vision", notes: oldBackstory.theVision || "", isCollapsed: false },
                    { id: 'b_4', title: "The Journey", notes: oldBackstory.theJourney || "", isCollapsed: false }
                ];
            } else if (!data.backstory) {
                data.backstory = [...initialCharacterData.backstory];
            }

            // Migrate personality
            if (data.personality && !Array.isArray(data.personality)) {
                const oldPersonality = data.personality;
                data.personality = [
                    { id: 'p_1', title: "Normal Personality", subtitle: "Default State", notes: oldPersonality.normal || "", isCollapsed: false },
                    { id: 'p_2', title: "Raging Personality", subtitle: "Combat State", notes: oldPersonality.raging || "", isCollapsed: false },
                    { id: 'p_3', title: "Likes", subtitle: "Interests & Preference", notes: oldPersonality.likes || "", isCollapsed: false },
                    { id: 'p_4', title: "Dislikes", subtitle: "Fears & Aversions", notes: oldPersonality.dislikes || "", isCollapsed: false }
                ];
            } else if (!data.personality) {
                data.personality = [...initialCharacterData.personality];
            } else {
                // Ensure isRed is stripped off migrated arrays
                data.personality.forEach(p => { if ('isRed' in p) delete p.isRed; });
            }

            // Migrate stats progression structure
            if (data.build && !data.build.abilities) {
                const oldStats = data.build.stats || [];
                const statMap = {};
                oldStats.forEach(s => {
                    statMap[s.name] = s.value;
                });

                data.build.abilities = [
                    { name: "Strength", starting: statMap["Strength"] || 15, species: 2, lvl1: 0, lvl4: 1, lvl8: 1, lvl12: 1, lvl16: 0, lvl19: 0, lvl20: 4 },
                    { name: "Dexterity", starting: statMap["Dexterity"] || 13, species: 1, lvl1: 0, lvl4: 0, lvl8: 0, lvl12: 0, lvl16: 0, lvl19: 0, lvl20: 0 },
                    { name: "Constitution", starting: statMap["Constitution"] || 14, species: 0, lvl1: 0, lvl4: 0, lvl8: 0, lvl12: 0, lvl16: 0, lvl19: 0, lvl20: 4 },
                    { name: "Intelligence", starting: statMap["Intelligence"] || 12, species: 0, lvl1: 0, lvl4: 0, lvl8: 0, lvl12: 0, lvl16: 0, lvl19: 0, lvl20: 0 },
                    { name: "Wisdom", starting: statMap["Wisdom"] || 12, species: 0, lvl1: 0, lvl4: 0, lvl8: 0, lvl12: 0, lvl16: 0, lvl19: 0, lvl20: 0 },
                    { name: "Charisma", starting: statMap["Charisma"] || 6, species: 0, lvl1: 0, lvl4: 0, lvl8: 0, lvl12: 0, lvl16: 0, lvl19: 0, lvl20: 0 }
                ];

                data.build.feats = { ...initialCharacterData.build.feats };
            }
        }

        let loadedData = JSON.parse(localStorage.getItem('viraDndNotes'));
        if (loadedData) {
            characterData = { ...initialCharacterData, ...loadedData };
        }
        migrateData(characterData); // Apply fallback corrections to structural notes on load

        // Overview tab removed, Backstory, Personality and Build tabs remain
        const navItems = [
            { id: 'campaignNotes', label: 'Campaign Notes', icon: 'map' },
            { id: 'campaign_sessionNotes', label: 'Session Notes', icon: 'scroll-text', isSubItem: true },
            { id: 'campaign_quests', label: 'Quests', icon: 'swords', isSubItem: true },
            { id: 'campaign_npcs', label: 'NPCs', icon: 'users', isSubItem: true },
            { id: 'campaign_locations', label: 'Locations', icon: 'map-pin', isSubItem: true },
            { id: 'campaign_misc', label: 'Misc & Loot', icon: 'package', isSubItem: true },
            { id: 'backstory', label: 'Backstory', icon: 'book-open' },
            { id: 'personality', label: 'Personality & Traits', icon: 'brain' },
            { id: 'build', label: 'Character Build', icon: 'shield' },
        ];

        // --- HYBRID CLOUD LOGIC ---
        let db = null;
        let cloudUser = null;
        let isCloudReady = false;
        let saveTimeout = null;
        let isLocalSaving = false; // Flag to prevent remote overwrites while typing
        let unsubscribeSnapshot = null;

        // Firebase Configuration
        const firebaseConfig = {
		  apiKey: "AIzaSyBbmh-jibUxCwbqVvzEDHX78YEweb_ld04",
		  authDomain: "vira-dnd.firebaseapp.com",
		  projectId: "vira-dnd",
		  storageBucket: "vira-dnd.firebasestorage.app",
		  messagingSenderId: "464258497921",
		  appId: "1:464258497921:web:b2ab64f9507ba6775dbc80",
		  measurementId: "G-VXZHJNQD1S"
        };
        const appId = 'vira-dnd-notes';

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        db = getFirestore(app);

        // Track Auth State changes
        onAuthStateChanged(auth, async (u) => {
            try {
                const authOverlay = document.getElementById('auth-overlay');
                
                // Only allow designated email logins. Force-logout anonymous accounts leftover from prior configs.
                if (u && !u.isAnonymous) {
                    cloudUser = u;
                    isCloudReady = true;
                    if(authOverlay) authOverlay.classList.add('hidden'); // Hide Lock Screen
                    updateCloudUIStatus("Connecting...", "loader-2", "bg-amber-900/50 text-amber-400 animate-pulse");
                    
                    // Set up real-time listener instead of a one-time getDoc
                    listenToCloudData();
                } else {
                    if (u && u.isAnonymous) {
                        await signOut(auth); // Clear out conflicting anonymous browser tokens
                    }
                    if (unsubscribeSnapshot) {
                        unsubscribeSnapshot();
                        unsubscribeSnapshot = null;
                    }
                    cloudUser = null;
                    isCloudReady = false;
                    if(authOverlay) authOverlay.classList.remove('hidden'); // Show Lock Screen
                    updateCloudUIStatus("Please Sign In", "lock", "bg-stone-800 text-stone-400");
                }
            } catch (err) {
                handleSyncError(err);
            }
        });

        // Setup real-time listeners with diagnostic feedback
        function listenToCloudData() {
            try {
                if (!cloudUser || !db) return;
                // Corrected 6-segment path to comply with Firestore document addressing rules
                const docRef = doc(db, 'artifacts', appId, 'users', cloudUser.uid, 'character_data', 'sheet');
                
                unsubscribeSnapshot = onSnapshot(docRef, (docSnap) => {
                    if (isLocalSaving) {
                        return; // Hold incoming snaps temporarily while user is actively typing
                    }
                    
                    if (docSnap.exists()) {
                        characterData = { ...initialCharacterData, ...docSnap.data() };
                        migrateData(characterData); // Maintain structural integrity on sync-down
                        document.getElementById('header-name-input').value = characterData.name;
                        window.renderContent();
                        lucide.createIcons();
                        updateCloudUIStatus("Cloud Sync Active", "cloud-lightning", "bg-emerald-900/50 text-emerald-400");
                    } else {
                        // Seed new user account with clean defaults
                        setDoc(docRef, characterData).then(() => {
                            updateCloudUIStatus("Cloud Sync Active", "cloud-lightning", "bg-emerald-900/50 text-emerald-400");
                        }).catch(err => {
                            handleSyncError(err);
                        });
                    }
                }, (error) => {
                    handleSyncError(error);
                });
            } catch (err) {
                handleSyncError(err);
            }
        }

        function handleSyncError(error) {
            console.error("Firestore operation failed:", error);
            if (error.code === 'permission-denied') {
                updateCloudUIStatus("Rules Error: Denied", "shield-alert", "bg-red-950 text-red-400 border border-red-800");
            } else {
                updateCloudUIStatus("Sync Error: " + (error.code || error.message || "Unknown"), "cloud-off", "bg-red-950 text-red-400");
            }
        }

        // --- CUSTOM MODAL DIALOG CONTROLLERS ---
        window.showCustomConfirm = function(title, message, icon, onConfirm) {
            const dialog = document.getElementById('custom-dialog');

        window.recalculateBuildScores = function() {
            const abilities = characterData.build.abilities;
            const keys = ['starting', 'species', 'lvl1', 'lvl4', 'lvl8', 'lvl12', 'lvl16', 'lvl19', 'lvl20'];
            
            const cumulativeScores = {
                starting: {}, species: {}, lvl1: {}, lvl4: {}, lvl8: {}, lvl12: {}, lvl16: {}, lvl19: {}, lvl20: {}
            };

            abilities.forEach((ability, aIdx) => {
                let currentVal = 0;
                keys.forEach((key) => {
                    const cellVal = parseInt(ability[key]) || 0;
                    currentVal += cellVal;
                    
                    cumulativeScores[key][ability.name] = currentVal;

                    const scoreCell = document.getElementById(`score-cell-${aIdx}-${key}`);
                    if (scoreCell) {
                        const mod = Math.floor((currentVal - 10) / 2);
                        const modStr = (mod >= 0 ? '+' : '') + mod;
                        scoreCell.innerHTML = `
                            <span class="font-extrabold text-stone-800 text-sm">${currentVal}</span>
                            <span class="text-xs text-emerald-600 font-bold ml-1">(${modStr})</span>
                        `;
                    }
                });
            });

            // Re-calculate AC matrix steps based on current level stats
            keys.forEach(key => {
                const dex = cumulativeScores[key]["Dexterity"] || 10;
                const con = cumulativeScores[key]["Constitution"] || 10;
                
                const dexMod = Math.floor((dex - 10) / 2);
                const conMod = Math.floor((con - 10) / 2);

                // Unarmored Defense: 10 + dexMod + conMod
                const unarmored = 10 + dexMod + conMod;
                const unarmoredEl = document.getElementById(`ac-unarmored-${key}`);
                if (unarmoredEl) unarmoredEl.innerText = unarmored;

                // Chain shirt: 13 + dexMod (max 2)
                const chain = 13 + Math.min(2, dexMod);
                const chainEl = document.getElementById(`ac-chain-${key}`);
                if (chainEl) chainEl.innerText = chain;

                // Scale/Breastplate: 14 + dexMod (max 2)
                const scale = 14 + Math.min(2, dexMod);
                const scaleEl = document.getElementById(`ac-scale-${key}`);
                if (scaleEl) scaleEl.innerText = scale;
            });
        };

        window.handleOutlineFocus = function(event) {

        // --- THE MENTION SYSTEM ---
        let mentionContext = null;

        // Suggestions based on state (Corrected backstory and personality lookup array paths)
        function getMentionSuggestions(query) {
            const q = query.toLowerCase();
            let results = [];
            
            characterData.campaignNotes.sessionNotes.forEach(s => {
                if (s.title && s.title.toLowerCase().includes(q)) results.push({ type: 'Session', id: 'campaign_sessionNotes', label: s.title });
            });
            characterData.campaignNotes.quests.forEach(qItem => {
                if (qItem.title && qItem.title.toLowerCase().includes(q)) results.push({ type: 'Quest', id: 'campaign_quests', label: qItem.title });
            });
            characterData.campaignNotes.npcs.forEach(fac => {
                if (fac.name && fac.name.toLowerCase().includes(q)) results.push({ type: 'Faction', id: 'campaign_npcs', label: fac.name });
                fac.members.forEach(npc => {
                    if (npc.name && npc.name.toLowerCase().includes(q)) results.push({ type: 'NPC', id: 'campaign_npcs', label: npc.name });
                });
            });
            characterData.campaignNotes.locations.forEach(loc => {
                if (loc.title && loc.title.toLowerCase().includes(q)) results.push({ type: 'Location', id: 'campaign_locations', label: loc.title });
            });
            characterData.backstory.forEach(b => {
                if (b.title && b.title.toLowerCase().includes(q)) results.push({ type: 'Backstory', id: 'backstory', label: b.title });
            });
            characterData.personality.forEach(p => {
                if (p.title && p.title.toLowerCase().includes(q)) results.push({ type: 'Personality', id: 'personality', label: p.title });
            });
            
            return results;
        }

        window.handleKeyDown = function(event) {
            const dropdown = document.getElementById('mention-dropdown');
            if (dropdown.classList.contains('hidden') || !mentionContext) return;

            if (event.key === 'ArrowDown') {
                event.preventDefault();
                mentionContext.selectedIndex = Math.min(mentionContext.selectedIndex + 1, mentionContext.results.length - 1);
                renderMentionDropdownItems();
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                mentionContext.selectedIndex = Math.max(mentionContext.selectedIndex - 1, 0);
                renderMentionDropdownItems();
            } else if (event.key === 'Tab' || event.key === 'Enter') {
                event.preventDefault();
                const selected = mentionContext.results[mentionContext.selectedIndex];
                if (selected) {
                    window.insertMention(selected.id, selected.label);
                }
            } else if (event.key === 'Escape') {
                event.preventDefault();
                hideMentionDropdown();
            }
        };

        window.handleInput = function(event, section, field) {
            const div = event.target;
            
            if (section === 'backstory') {
                const bEntry = characterData.backstory.find(b => b.id === field);
                if(bEntry) bEntry.notes = div.innerHTML;
            } else if (section === 'personality') {
                const pEntry = characterData.personality.find(p => p.id === field);
                if(pEntry) pEntry.notes = div.innerHTML;
            } else if (section === 'campaignNotes_session') {
                const sess = characterData.campaignNotes.sessionNotes.find(s => s.id === field);
                if(sess) sess.notes = div.innerHTML;
            } else if (section === 'campaignNotes_quest') {
                const quest = characterData.campaignNotes.quests.find(q => q.id === field);
                if(quest) quest.notes = div.innerHTML;
            } else if (section === 'campaignNotes_location') {
                const loc = characterData.campaignNotes.locations.find(l => l.id === field);
                if(loc) loc.notes = div.innerHTML;
            } else if (section === 'campaignNotes_npc') {
                const [facId, npcId] = field.split('_npc_');
                const fac = characterData.campaignNotes.npcs.find(f => f.id === facId);
                if(fac) {
                    const npc = fac.members.find(n => n.id === 'npc_' + npcId);
                    if(npc) npc.notes = div.innerHTML;
                }
            } else {
                window.updateField(section, field, div.innerHTML);
            }
            window.saveData();

            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            const range = selection.getRangeAt(0);
            const node = range.startContainer;
            
            if (node.nodeType === Node.TEXT_NODE) {
                const textUpToCursor = node.textContent.substring(0, range.startOffset);
                const match = textUpToCursor.match(/(?:\s|^)(@[a-zA-Z0-9_\-\' ]{0,40})$/);
                
                if (match) {
                    const matchString = match[1];
                    const query = matchString.substring(1);
                    const endOffset = range.startOffset;
                    const startOffset = endOffset - matchString.length;
                    
                    showMentionDropdown(div, query, node, startOffset, endOffset);
                } else {
                    hideMentionDropdown();
                }
            } else {
                hideMentionDropdown();
            }
        };

        function showMentionDropdown(div, query, textNode, startOffset, endOffset) {
            const results = getMentionSuggestions(query);
            const dropdown = document.getElementById('mention-dropdown');
            
            if (results.length === 0) {
                hideMentionDropdown();
                return;
            }

            mentionContext = { div, textNode, startOffset, endOffset, results, selectedIndex: 0 };
            
            const rect = div.getBoundingClientRect();
            dropdown.style.top = (rect.bottom + 5) + 'px'; 
            dropdown.style.left = rect.left + 'px';
            dropdown.style.width = Math.min(rect.width, 350) + 'px';
            dropdown.classList.remove('hidden');

            renderMentionDropdownItems();
        }

        function renderMentionDropdownItems() {
            const dropdown = document.getElementById('mention-dropdown');
            if (!mentionContext) return;
            
            dropdown.innerHTML = mentionContext.results.map((res, i) => {
                const isActive = i === mentionContext.selectedIndex;
                const activeClasses = isActive 
                    ? 'bg-emerald-100 border-l-4 border-emerald-500 pl-3' 
                    : 'bg-white hover:bg-emerald-50 border-l-4 border-transparent pl-4';
                
                return `
                    <li onmousedown="event.preventDefault(); window.insertMention('${res.id}', '${escapeHtml(res.label).replace(/'/g, "\\'")}')" 
                        class="py-3 pr-4 cursor-pointer flex flex-col transition-all border-b border-stone-100 last:border-0 ${activeClasses}">
                        <span class="font-bold text-stone-800">${escapeHtml(res.label)}</span>
                        <span class="text-xs font-semibold text-emerald-600 uppercase tracking-wider">${res.type}</span>
                    </li>
                `;
            }).join('');

            const activeEl = dropdown.children[mentionContext.selectedIndex];
            if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });
        }

        function hideMentionDropdown() {
            document.getElementById('mention-dropdown').classList.add('hidden');
            mentionContext = null;
        }

        window.insertMention = function(targetTabId, label) {
            if (!mentionContext) return;
            const { div, textNode, startOffset, endOffset } = mentionContext;
            
            const selection = window.getSelection();
            const range = document.createRange();
            
            try {
                range.setStart(textNode, startOffset);
                range.setEnd(textNode, endOffset);
                range.deleteContents();
                
                const a = document.createElement('a');
                a.href = "#";
                a.className = "text-emerald-700 bg-emerald-100/80 font-bold px-1.5 py-0.5 mx-0.5 rounded shadow-sm hover:bg-emerald-200 hover:text-emerald-800 transition-colors inline-flex items-center no-underline cursor-pointer";
                a.contentEditable = "false";
                a.setAttribute('onclick', `window.setTab('${targetTabId}'); return false;`);
                a.innerText = "@" + label;
                
                range.insertNode(a);
                
                const space = document.createTextNode('\u00A0'); 
                a.parentNode.insertBefore(space, a.nextSibling);
                
                range.setStartAfter(space);
                range.setEndAfter(space);
                selection.removeAllRanges();
                selection.addRange(range);
            } catch (e) {
                console.error("Mention insert failed: ", e);
            }
            
            hideMentionDropdown();
            div.dispatchEvent(new Event('input', { bubbles: true }));

                for (let i = index + 1; i < arr.length; i++) if (arr[i].isCompleted === isCompleted) { targetIdx = i; break; }

        // --- AVATAR UPLOAD, CROP & COMPRESSION HANDLERS ---
        window.handleNPCAvatarUpload = function(event, facId, npcId) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const TARGET_SIZE = 128; // Fits beautifully inside small circle avatars

                    let width = img.width;
                    let height = img.height;

                    // Calculate square crop boundaries (centered)
                    let size = Math.min(width, height);
                    let xOffset = (width - size) / 2;
                    let yOffset = (height - size) / 2;

                    canvas.width = TARGET_SIZE;
                    canvas.height = TARGET_SIZE;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, xOffset, yOffset, size, size, 0, 0, TARGET_SIZE, TARGET_SIZE);

                    // Highly compressed data URL (around ~3KB - ~5KB)
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);

                    const fac = characterData.campaignNotes.npcs.find(f => f.id === facId);
                    if (fac) {
                        const npc = fac.members.find(n => n.id === npcId);
                        if (npc) {
                            npc.avatar = compressedBase64;
                            window.saveData();
                            window.renderContent();
                            lucide.createIcons();
                        }
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

            if (fac) {

                }
            }
        };

                                </div>
                                <div class="collapsible-content ${isCollapsed ? 'collapsed' : ''}">
                                    <div class="p-5">${getOutlineNotesEditor('campaignNotes_session', sess.id, sess.notes, 'min-h-[150px]', 'Start typing your session notes... Hitting Enter starts a bullet point, Tab indents, Shift+Tab outdents. Type @ to link notes.')}</div>
                                </div>
                            </div>`;
                    });
                }
                else if (subSection === 'quests') {
                    const inProgressQuests = characterData.campaignNotes.quests.filter(q => !q.isCompleted);
                    const completedQuests = characterData.campaignNotes.quests.filter(q => q.isCompleted);

                    contentHtml = `
                        <div class="mb-6 flex gap-4">
                            <div class="relative flex-1">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="search" class="w-5 h-5 text-stone-400"></i></div>
                                <input type="text" id="quest-search" oninput="window.filterQuests(this.value)" placeholder="Search quests..." class="seamless-input w-full pl-10 pr-4 py-3 border border-stone-200 rounded-xl bg-white shadow-sm">
                            </div>
                            <button onclick="window.addQuest()" class="flex items-center space-x-2 px-4 py-3 bg-emerald-100 text-emerald-800 font-medium rounded-xl hover:bg-emerald-200 transition-colors shadow-sm"><i data-lucide="plus" class="w-5 h-5"></i><span class="hidden sm:inline">Add Quest</span></button>
                        </div>`;

                    const renderQuestCategory = (title, quests, categoryKey) => {
                        const isCollapsed = questSectionsState[categoryKey];
                        let sectionHtml = `<div class="quest-section mb-8" data-section-type="${categoryKey}"><div class="flex items-center justify-between mb-4 cursor-pointer hover:bg-stone-50 p-2 rounded -mx-2 transition-colors" onclick="window.toggleQuestSectionCollapse('${categoryKey}')"><h4 class="text-lg font-bold text-stone-700 flex items-center space-x-2"><i data-lucide="chevron-down" class="w-5 h-5 text-stone-400 chevron ${isCollapsed ? 'collapsed' : ''}"></i><span>${title} (${quests.length})</span></h4></div><div class="collapsible-content space-y-4 ${isCollapsed ? 'collapsed' : ''}">`;
                        if (quests.length === 0) sectionHtml += `<p class="text-stone-400 italic px-8 py-2">No quests in this category.</p>`;

                        quests.forEach((quest, qIdx) => {
                            const isFirst = qIdx === 0;
                            const isLast = qIdx === quests.length - 1;
                            sectionHtml += `
                                <div class="quest-card bg-white border border-stone-200 rounded-xl shadow-sm overflow-hidden flex" data-searchable="${escapeHtml(`${quest.title} ${quest.subtitle} ${quest.notes}`)}">
                                    <div class="bg-stone-50 px-4 py-5 flex flex-col items-center justify-start border-r border-stone-100">
                                        <button onclick="window.toggleQuestCompletion('${quest.id}')" class="text-stone-300 hover:text-emerald-500 transition-colors focus:outline-none">
                                            ${quest.isCompleted ? `<i data-lucide="check-square" class="w-6 h-6 text-emerald-500"></i>` : `<i data-lucide="square" class="w-6 h-6 hover:text-emerald-400"></i>`}
                                        </button>
                                    </div>
                                    <div class="p-5 flex-1 flex flex-col">
                                        <div class="flex justify-between items-start mb-2">
                                            <div class="flex-1">
                                                <input type="text" oninput="window.updateQuest('${quest.id}', 'title', this.value)" value="${escapeHtml(quest.title)}" class="seamless-input font-bold text-lg ${quest.isCompleted ? 'text-stone-500 line-through' : 'text-stone-800'} bg-transparent w-full mb-1 rounded px-2 -ml-2 py-0.5" placeholder="Quest Title">
                                                <input type="text" oninput="window.updateQuest('${quest.id}', 'subtitle', this.value)" value="${escapeHtml(quest.subtitle)}" class="seamless-input text-sm font-medium text-emerald-600 bg-transparent w-full rounded px-2 -ml-2 py-0.5" placeholder="Subtitle / Category">
                                            </div>
                                            <div class="flex items-center space-x-1 ml-4">
                                                <button onclick="window.moveQuest('${quest.id}', -1)" ${isFirst ? 'disabled class="text-stone-300 cursor-not-allowed p-1.5"' : 'class="text-stone-500 hover:text-emerald-600 transition-colors p-1.5 rounded hover:bg-stone-100"'} title="Move Quest Up">
                                                    <i data-lucide="arrow-up" class="w-4 h-4"></i>
                                                </button>
                                                <button onclick="window.moveQuest('${quest.id}', 1)" ${isLast ? 'disabled class="text-stone-300 cursor-not-allowed p-1.5"' : 'class="text-stone-500 hover:text-emerald-600 transition-colors p-1.5 rounded hover:bg-stone-100"'} title="Move Quest Down">
                                                    <i data-lucide="arrow-down" class="w-4 h-4"></i>
                                                </button>
                                                <button onclick="window.deleteQuest('${quest.id}')" class="text-stone-300 hover:text-red-500 transition-colors p-1.5 rounded hover:bg-red-50" title="Delete Quest">
                                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                                </button>
                                            </div>
                                        </div>
                                        <div class="mt-2 text-stone-600 ${quest.isCompleted ? 'opacity-75' : ''}">
                                            ${getOutlineNotesEditor('campaignNotes_quest', quest.id, quest.notes, 'min-h-[60px]', 'Quest description or sub-objectives... Enter starts a bullet, Tab indents, @ to link.')}
                                        </div>
                                    </div>
                                </div>`;
                        });
                        sectionHtml += `</div></div>`;
                        return sectionHtml;
                    };

                    contentHtml += renderQuestCategory('In Progress', inProgressQuests, 'inProgress');
                    contentHtml += renderQuestCategory('Completed', completedQuests, 'completed');
                }
                else if (subSection === 'locations') {
                    contentHtml = `
                        <div class="mb-6 flex flex-col sm:flex-row gap-4 items-center justify-between">
                            <div class="relative w-full sm:w-2/3">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="search" class="w-5 h-5 text-stone-400"></i></div>
                                <input type="text" id="location-search" oninput="window.filterLocations(this.value)" placeholder="Search locations..." class="seamless-input w-full pl-10 pr-4 py-3 border border-stone-200 rounded-xl bg-white shadow-sm">
                            </div>
                            <div class="flex space-x-2 w-full sm:w-auto">
                                <button onclick="window.toggleAllLocations(false)" class="flex-1 sm:flex-none px-3 py-2 bg-white hover:bg-stone-50 text-stone-600 rounded-lg text-sm font-medium transition-colors border border-stone-200">Expand All</button>
                                <button onclick="window.toggleAllLocations(true)" class="flex-1 sm:flex-none px-3 py-2 bg-white hover:bg-stone-50 text-stone-600 rounded-lg text-sm font-medium transition-colors border border-stone-200">Collapse All</button>
                                <button onclick="window.addLocation()" class="flex-1 sm:flex-none flex justify-center items-center px-3 py-2 bg-emerald-100 text-emerald-800 font-medium rounded-lg hover:bg-emerald-200 transition-colors shadow-sm"><i data-lucide="plus" class="w-5 h-5"></i></button>
                            </div>
                        </div>`;
                        
                    if (characterData.campaignNotes.locations.length === 0) contentHtml += `<p class="text-stone-500 text-center py-8 italic">No locations added yet.</p>`;
                    
                    characterData.campaignNotes.locations.forEach((loc, idx) => {
                        const isCollapsed = loc.isCollapsed;
                        const isFirst = idx === 0;
                        const isLast = idx === characterData.campaignNotes.locations.length - 1;
                        contentHtml += `
                            <div class="location-block mb-4 border border-stone-200 rounded-xl bg-white shadow-sm overflow-hidden" data-searchable="${escapeHtml(`${loc.title} ${loc.subtitle} ${loc.notes}`)}">
                                <div class="bg-stone-50/80 border-b border-stone-200 px-5 py-4 flex justify-between items-start transition-colors">
                                    <div class="flex-1 flex flex-col sm:flex-row sm:items-center gap-2">
                                        <button onclick="window.toggleLocationCollapse('${loc.id}')" class="p-1 hover:bg-stone-200 rounded transition-colors focus:outline-none hidden sm:block">
                                            <i data-lucide="chevron-down" class="w-5 h-5 text-stone-400 chevron ${isCollapsed ? 'collapsed' : ''}"></i>
                                        </button>
                                        <input type="text" oninput="window.updateLocation('${loc.id}', 'title', this.value)" value="${escapeHtml(loc.title)}" class="seamless-input font-bold text-lg text-stone-800 bg-transparent px-2 py-1 -ml-2 w-full sm:w-auto rounded" placeholder="Location Name">
                                        <input type="text" oninput="window.updateLocation('${loc.id}', 'subtitle', this.value)" value="${escapeHtml(loc.subtitle)}" class="seamless-input text-sm font-medium text-emerald-600 bg-transparent px-2 py-1 w-full sm:w-auto rounded" placeholder="Region / Details">
                                    </div>
                                    <div class="flex items-center space-x-1 ml-2">
                                        <button onclick="window.moveLocation('${loc.id}', -1)" ${isFirst ? 'disabled class="text-stone-300 cursor-not-allowed p-1.5"' : 'class="text-stone-500 hover:text-emerald-600 transition-colors p-1.5 rounded hover:bg-stone-100"'} title="Move Location Up">
                                            <i data-lucide="arrow-up" class="w-4 h-4"></i>
                                        </button>
                                        <button onclick="window.moveLocation('${loc.id}', 1)" ${isLast ? 'disabled class="text-stone-300 cursor-not-allowed p-1.5"' : 'class="text-stone-500 hover:text-emerald-600 transition-colors p-1.5 rounded hover:bg-stone-100"'} title="Move Location Down">
                                            <i data-lucide="arrow-down" class="w-4 h-4"></i>
                                        </button>
                                        <button onclick="window.deleteLocation('${loc.id}')" class="text-stone-300 hover:text-red-500 transition-colors p-1.5 rounded hover:bg-red-50" title="Delete Location">
                                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="collapsible-content ${isCollapsed ? 'collapsed' : ''}">
                                    <div class="p-5">${getOutlineNotesEditor('campaignNotes_location', loc.id, loc.notes, 'min-h-[100px]', 'Location details, points of interest, or resident lists... Enter starts a bullet, Tab indents, @ to link.')}</div>
                                </div>
                            </div>`;
                    });
                }
                else if (subSection === 'npcs') {
                    contentHtml = `
                        <div class="mb-6 flex gap-4">
                            <div class="relative flex-1">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="search" class="w-5 h-5 text-stone-400"></i></div>
                                <input type="text" id="npc-search" oninput="window.filterNPCs(this.value)" placeholder="Search NPCs..." class="seamless-input w-full pl-10 pr-4 py-3 border border-stone-200 rounded-xl bg-white shadow-sm">
                            </div>
                            <button onclick="window.addFaction()" class="flex items-center space-x-2 px-4 py-3 bg-emerald-100 text-emerald-800 font-medium rounded-xl hover:bg-emerald-200 transition-colors shadow-sm"><i data-lucide="plus" class="w-5 h-5"></i><span class="hidden sm:inline">Add Faction</span></button>
                        </div>`;
                        
                    if (characterData.campaignNotes.npcs.length === 0) contentHtml += `<p class="text-stone-500 text-center py-8 italic">No NPCs added yet.</p>`;
                    
                    characterData.campaignNotes.npcs.forEach((faction, fIdx) => {
                        const isFirstFaction = fIdx === 0;
                        const isLastFaction = fIdx === characterData.campaignNotes.npcs.length - 1;
                        contentHtml += `
                            <div class="npc-faction-block mb-8 border border-stone-200 rounded-xl overflow-hidden bg-stone-50" data-faction-name="${escapeHtml(faction.name)}">
                                <div class="bg-stone-200/50 px-4 py-3 border-b border-stone-200 flex justify-between items-center">
                                    <input type="text" oninput="window.updateFaction('${faction.id}', this.value)" value="${escapeHtml(faction.name)}" class="seamless-input font-bold text-lg text-stone-800 bg-transparent w-2/3 rounded px-2 -ml-2 py-0.5">
                                    <div class="flex items-center space-x-1">
                                        <button onclick="window.moveFaction('${faction.id}', -1)" ${isFirstFaction ? 'disabled class="text-stone-300 cursor-not-allowed p-1.5"' : 'class="text-stone-500 hover:text-emerald-600 transition-colors p-1.5 rounded hover:bg-stone-300/50"'} title="Move Faction Up">
                                            <i data-lucide="arrow-up" class="w-4 h-4"></i>
                                        </button>
                                        <button onclick="window.moveFaction('${faction.id}', 1)" ${isLastFaction ? 'disabled class="text-stone-300 cursor-not-allowed p-1.5"' : 'class="text-stone-500 hover:text-emerald-600 transition-colors p-1.5 rounded hover:bg-stone-300/50"'} title="Move Faction Down">
                                            <i data-lucide="arrow-down" class="w-4 h-4"></i>
                                        </button>
                                        <button onclick="window.deleteFaction('${faction.id}')" class="text-stone-400 hover:text-red-500 transition-colors p-1.5 rounded hover:bg-red-50" title="Delete Faction">
                                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="p-4 space-y-4">
                                    ${faction.members.map((npc, nIdx) => {
                                        const isFirstNPC = nIdx === 0;
                                        const isLastNPC = nIdx === faction.members.length - 1;
                                        return `
                                        <div class="npc-card bg-white p-4 rounded-lg border border-stone-200 shadow-sm flex gap-4 transition-all" data-searchable="${escapeHtml(npc.name)} ${escapeHtml(npc.notes)}">
                                            
                                            <!-- Circular Interactive Avatar Circle Slot -->
                                            <div class="flex-shrink-0 flex items-start mt-1">
                                                <div class="relative w-14 h-14 rounded-full border border-stone-200 hover:border-emerald-400 bg-stone-50 flex items-center justify-center overflow-hidden group cursor-pointer shadow-inner transition-all" onclick="document.getElementById('avatar-input-${faction.id}-${npc.id}').click()" title="Click to upload character avatar">
                                                    ${npc.avatar ? 
                                                        `<img src="${npc.avatar}" class="w-full h-full object-cover">` : 
                                                        `<i data-lucide="user" class="w-6 h-6 text-stone-400"></i>`
                                                    }
                                                    <!-- Slick Camera Overlay on Hover -->
                                                    <div class="absolute inset-0 bg-stone-900/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity duration-200">
                                                        <i data-lucide="camera" class="w-4 h-4 text-white"></i>
                                                    </div>
                                                    <!-- Quick Delete Avatar Button overlay -->
                                                    ${npc.avatar ? `
                                                        <button onclick="window.deleteNPCAvatar(event, '${faction.id}', '${npc.id}')" class="absolute top-0 right-0 p-0.5 bg-red-600 hover:bg-red-700 text-white rounded-bl shadow opacity-0 group-hover:opacity-100 transition-opacity duration-200" title="Remove character avatar">
                                                            <i data-lucide="trash-2" class="w-3 h-3"></i>
                                                        </button>
                                                    ` : ''}
                                                </div>
                                                <!-- Hidden custom files collector input -->
                                                <input type="file" id="avatar-input-${faction.id}-${npc.id}" accept="image/*" class="hidden" onchange="window.handleNPCAvatarUpload(event, '${faction.id}', '${npc.id}')">
                                            </div>

                                            <div class="flex-1 min-w-0">
                                                <input type="text" oninput="window.updateNPC('${faction.id}', '${npc.id}', 'name', this.value)" value="${escapeHtml(npc.name)}" class="seamless-input font-bold text-stone-800 w-full mb-1 bg-transparent rounded px-2 -ml-2 py-0.5" placeholder="Character Name">
                                                ${getOutlineNotesEditor('campaignNotes_npc', faction.id + '_' + npc.id, npc.notes, 'min-h-[40px] text-sm', 'Character details, traits, affiliations... Enter starts a bullet, Tab indents, @ to link.')}
                                            </div>
                                            <div class="flex flex-col justify-between items-end border-l border-stone-100 pl-3 self-stretch flex-shrink-0">
                                                <button onclick="window.deleteNPC('${faction.id}', '${npc.id}')" class="text-stone-300 hover:text-red-500 transition-colors p-1.5 rounded hover:bg-red-50" title="Delete NPC">
                                                    <i data-lucide="x" class="w-4 h-4"></i>
                                                </button>
                                                <div class="flex space-x-0.5 mt-2">
                                                    <button onclick="window.moveNPC('${faction.id}', '${npc.id}', -1)" ${isFirstNPC ? 'disabled class="text-stone-200 cursor-not-allowed p-1"' : 'class="text-stone-400 hover:text-emerald-600 transition-colors p-1 rounded hover:bg-stone-100"'} title="Move NPC Up">
                                                        <i data-lucide="arrow-up" class="w-3.5 h-3.5"></i>
                                                    </button>
                                                    <button onclick="window.moveNPC('${faction.id}', '${npc.id}', 1)" ${isLastNPC ? 'disabled class="text-stone-200 cursor-not-allowed p-1"' : 'class="text-stone-400 hover:text-emerald-600 transition-colors p-1 rounded hover:bg-stone-100"'} title="Move NPC Down">
                                                        <i data-lucide="arrow-down" class="w-3.5 h-3.5"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>`;
                                    }).join('')}
                                    <button onclick="window.addNPC('${faction.id}')" class="w-full py-2 mt-2 border-2 border-dashed border-stone-300 text-stone-500 rounded-lg hover:border-emerald-400 hover:text-emerald-600 hover:bg-emerald-50 transition-colors flex items-center justify-center space-x-2"><i data-lucide="user-plus" class="w-4 h-4"></i><span>Add Character to Faction</span></button>
                                </div>
                            </div>`;
                    });
                } 
                else {
                    contentHtml = getOutlineNotesEditor('campaignNotes', subSection, characterData.campaignNotes[subSection], 'min-h-[250px]', 'Party inventory, loot lists, campaign rules, or general scratchpad... Enter starts a bullet, Tab indents, @ to link.');
                }

                html = `
                <div class="space-y-6 animate-fade-in h-full flex flex-col">
                    <section class="bg-white p-6 rounded-2xl shadow-sm border border-stone-200 flex-grow flex flex-col">
                        <h3 class="text-2xl font-bold text-stone-800 mb-6 flex items-center space-x-2 border-b border-stone-100 pb-4">
                            <i data-lucide="${sectionData.icon}" class="text-emerald-600"></i><span>${sectionData.title}</span>
                        </h3>
                        <div class="flex-grow flex flex-col">
                            ${contentHtml}
                        </div>
                    </section>
                </div>`;
            }

            container.innerHTML = html;

            // Trigger progression points re-render instantly on mount of Build panel
            if (activeTab === 'build') {
                window.recalculateBuildScores();
            }

            // Restore any active search filter so UI matches current query perfectly
            if (activeTab === 'campaign_sessionNotes' && currentSearchQueries.sessionNotes) {
                const searchInput = document.getElementById('session-search');
                if (searchInput) { searchInput.value = currentSearchQueries.sessionNotes; window.filterSessions(currentSearchQueries.sessionNotes); }
            } else if (activeTab === 'campaign_quests' && currentSearchQueries.quests) {
                const searchInput = document.getElementById('quest-search');
                if (searchInput) { searchInput.value = currentSearchQueries.quests; window.filterQuests(currentSearchQueries.quests); }
            } else if (activeTab === 'campaign_locations' && currentSearchQueries.locations) {
                const searchInput = document.getElementById('location-search');
                if (searchInput) { searchInput.value = currentSearchQueries.locations; window.filterLocations(currentSearchQueries.locations); }
            } else if (activeTab === 'campaign_npcs' && currentSearchQueries.npcs) {
                const searchInput = document.getElementById('npc-search');
                if (searchInput) { searchInput.value = currentSearchQueries.npcs; window.filterNPCs(currentSearchQueries.npcs); }
            } else if (activeTab === 'backstory' && currentSearchQueries.backstory) {
                const searchInput = document.getElementById('backstory-search');
                if (searchInput) { searchInput.value = currentSearchQueries.backstory; window.filterBackstory(currentSearchQueries.backstory); }
            } else if (activeTab === 'personality' && currentSearchQueries.personality) {
                const searchInput = document.getElementById('personality-search');
                if (searchInput) { searchInput.value = currentSearchQueries.personality; window.filterPersonality(currentSearchQueries.personality); }
            }
        }

        // --- INITIALIZATION ---
        document.getElementById('header-name-input').value = characterData.name;
        renderNavigation();
        window.renderContent();
        lucide.createIcons();
    </script>
</body>
</html>
