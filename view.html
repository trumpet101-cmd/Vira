<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Journal</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        // Public journal defaults to dark; viewers can toggle and their
        // choice sticks on this device only.
        var viewIsDark = localStorage.getItem('vira_view_dark') !== 'false';
        if (viewIsDark) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
    </script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Read-only page: only firebase-app + firestore are needed. No auth, no storage. -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <script src="js/lz-string.min.js"></script>

    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Read-only notes blocks reuse the app's outline-list look without the
           editable hover/focus styling of .seamless-input. */
        .notes-view ul { list-style-type: disc; margin-left: 1.5rem; margin-top: 0.25rem; margin-bottom: 0.25rem; }
        .notes-view ul ul { list-style-type: circle; margin-left: 1.5rem; }
        .notes-view ul ul ul { list-style-type: square; margin-left: 1.5rem; }
        .notes-view li { margin-bottom: 0.25rem; padding-left: 0.25rem; }
        .notes-view a { cursor: pointer; }
        /* Card flash when a @mention deep link lands */
        .deeplink-flash { box-shadow: 0 0 0 2px #10b981 !important; transition: box-shadow 0.3s ease; }
    </style>
</head>
<body class="bg-stone-100 text-stone-800 dark:bg-stone-950 dark:text-stone-100 font-sans min-h-screen">

    <!-- LOADING -->
    <div id="view-loading" class="fixed inset-0 flex flex-col items-center justify-center space-y-4 text-stone-400">
        <span class="text-4xl animate-pulse">🌿</span>
        <p class="text-sm font-semibold tracking-wide">Opening the journal...</p>
    </div>

    <!-- ERROR -->
    <div id="view-error" class="hidden fixed inset-0 flex items-center justify-center p-6">
        <div class="bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-800 rounded-2xl shadow-xl max-w-md w-full p-8 text-center animate-fade-in">
            <div class="text-4xl mb-3">📕</div>
            <h2 class="text-xl font-black tracking-tight" id="view-error-title">Journal Not Found</h2>
            <p class="text-sm text-stone-500 dark:text-stone-400 mt-2 leading-relaxed" id="view-error-message">This campaign journal isn't published, or the link is incomplete.</p>
        </div>
    </div>

    <!-- CONTENT SHELL -->
    <div id="view-shell" class="hidden">

        <header class="bg-white dark:bg-stone-900 border-b border-stone-200 dark:border-stone-800/80 shadow-sm dark:shadow-none px-4 sm:px-6 py-4">
            <div class="max-w-5xl mx-auto flex flex-wrap items-center gap-x-4 gap-y-3">
                <div class="flex items-center gap-3 min-w-0 flex-1">
                    <div id="view-avatar" class="w-11 h-11 rounded-full border border-stone-200 dark:border-stone-700 bg-stone-100 dark:bg-stone-800 flex items-center justify-center overflow-hidden flex-shrink-0"></div>
                    <div class="min-w-0">
                        <h1 id="view-name" class="text-xl sm:text-2xl font-black tracking-tight truncate"></h1>
                        <p class="text-xs text-stone-500 dark:text-stone-400 font-medium truncate">
                            <span id="view-basics"></span>
                            <span class="mx-1.5 text-stone-300 dark:text-stone-700">·</span>
                            <span id="view-published"></span>
                        </p>
                    </div>
                </div>
                <div class="relative order-last sm:order-none w-full sm:w-72 sm:flex-shrink-0">
                    <i data-lucide="search" class="w-4 h-4 text-stone-400 absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                    <input type="text" id="view-search" autocomplete="off"
                        oninput="window.handleViewSearch(this.value)"
                        onkeydown="window.handleViewSearchKey(event)"
                        onblur="window.handleViewSearchBlur()"
                        placeholder="Search the journal..."
                        class="w-full pl-9 pr-3 py-2 text-sm border border-stone-200 dark:border-stone-800 rounded-xl bg-stone-50 dark:bg-stone-950 dark:text-stone-100 focus:bg-white dark:focus:bg-stone-900 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition-all font-medium placeholder:text-stone-400">
                    <ul id="view-search-dropdown" class="hidden absolute left-0 right-0 mt-2 bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-800 rounded-xl shadow-2xl max-h-[340px] overflow-y-auto z-50 flex flex-col text-sm custom-scrollbar animate-fade-in"></ul>
                </div>
                <div class="flex items-center gap-2 flex-shrink-0">
                    <span class="hidden sm:inline-flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-wider text-stone-500 dark:text-stone-400 bg-stone-100 dark:bg-stone-800 border border-stone-200 dark:border-stone-700 px-2.5 py-1 rounded-full">
                        <i data-lucide="eye" class="w-3 h-3"></i><span>Read-only</span>
                    </span>
                    <button onclick="window.toggleViewDark()" class="w-9 h-9 flex items-center justify-center rounded-lg bg-stone-100 dark:bg-stone-800 hover:bg-stone-200 dark:hover:bg-stone-700 text-stone-500 dark:text-stone-300 transition-colors" title="Toggle dark mode">
                        <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
                        <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- TAB NAV -->
        <nav class="sticky top-0 z-20 bg-stone-100/95 dark:bg-stone-950/95 backdrop-blur border-b border-stone-200 dark:border-stone-800/80">
            <div class="max-w-5xl mx-auto px-4 sm:px-6">
                <div id="view-tabs" class="flex gap-2 overflow-x-auto py-3 custom-scrollbar"></div>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
            <div id="view-content"></div>
            <footer class="mt-12 pb-8 text-center text-[11px] text-stone-400 dark:text-stone-600 font-medium">
                Published campaign journal · shared read-only by its author
            </footer>
        </main>
    </div>

    <!-- IMAGE LIGHTBOX -->
    <div id="view-lightbox" class="fixed inset-0 bg-stone-950/90 backdrop-blur-md z-[300] hidden items-center justify-center p-4" onclick="window.closeViewLightbox()">
        <img id="view-lightbox-img" src="" class="max-w-[450px] w-full aspect-square rounded-2xl object-cover shadow-2xl border border-stone-800/80 bg-stone-900 animate-fade-in" onclick="event.stopPropagation()">
    </div>

    <script src="js/view.js"></script>
</body>
</html>
